server:
  port: 8580

spring:
  application:
    name: gateway-api

  boot:
    admin:
      client:
        url: http://localhost:9090
        username: admin
        password: admin
        instance:
          management-base-url: http://localhost:8580
          metadata:
            user.name: admin
            user.password: admin


  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=Cookie
        - PreserveHostHeader
      routes:
        - id: travel-service
          uri: http://localhost:8581
          predicates:
            - Path=/travel/**
          filters:
            - StripPrefix=1
        - id: sushi-service
          uri: http://localhost:8582
          predicates:
            - Path=/sushi/**
          filters:
            - StripPrefix=1
        - id: padel-service
          uri: http://localhost:8584
          predicates:
            - Path=/padel/**
          filters:
            - StripPrefix=1

management:
  endpoint:
    web:
      exposure:
        include: "*"
    endpoint:
      health:
        show-details: always
