server.port=8581

spring.application.name=wigell-travels

spring.datasource.url=jdbc:mysql://localhost:3306/wigell_travels_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Stockholm
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info
management.endpoints.health.show-detail=always
management.info.env.enabled=true

info.app.name=Wigell Travels
info.app.version=1.0
info.app.description=Travel booking API

spring.boot.admin.client.url=http://localhost:9090/
spring.boot.admin.client.instance.management-base-url=http://localhost:8581/
spring.boot.admin.client.instance.metadata.user.name=a
spring.boot.admin.client.instance.metadata.user.password=1234